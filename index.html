<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サブスク管理アプリ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📱 サブスク管理</h1>

<div class="summary">

    <div class="card">
        <h3>今月</h3>
        <p>¥<span id="monthly">0</span></p>
    </div>

    <div class="card">
        <h3>年間</h3>
        <p>¥<span id="yearly">0</span></p>
    </div>

</div>

<div class="box">

    <h2>サブスク検索</h2>

    <input
        type="text"
        id="search"
        placeholder="Netflixなど">

    <button onclick="searchSub()">
        検索
    </button>

    <div id="result"></div>

</div>

<div class="box">

    <h2>登録</h2>

    <input
        type="text"
        id="name"
        placeholder="サービス名">

    <input
        type="number"
        id="price"
        placeholder="月額料金">

    <input
        type="number"
        id="day"
        placeholder="支払日(1～31)"
        min="1"
        max="31">

    <button id="addBtn" onclick="addSub()">
        追加
    </button>

</div>

<h2>契約中</h2>

<ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
